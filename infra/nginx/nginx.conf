        proxy_pass http://helpdesk-api:4001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Static asset caching (exclude API/proxy paths) ────────────
    location ~* ^/(b3|helpdesk|banter|beacon|brief|bolt|bearing|board|bond|blast|bill|blank|book|bench)/assets/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
