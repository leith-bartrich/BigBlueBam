x-common: &common
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  # ── Infrastructure ──────────────────────────────────────────────
  postgres:
    <<: *common
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bigbluebam
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bigbluebam} -d bigbluebam"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - backend

  redis:
    <<: *common
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=$REDIS_PASSWORD redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend

  minio:
    <<: *common
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - backend

  # ── Application ─────────────────────────────────────────────────
  api:
    <<: *common
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: production
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:?}:${POSTGRES_PASSWORD:?}@postgres:5432/bigbluebam
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      S3_BUCKET: ${S3_BUCKET:-bigbluebam-uploads}
      S3_REGION: ${S3_REGION:-us-east-1}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      OAUTH_GITHUB_CLIENT_ID: ${OAUTH_GITHUB_CLIENT_ID:-}
      OAUTH_GITHUB_CLIENT_SECRET: ${OAUTH_GITHUB_CLIENT_SECRET:-}
      OAUTH_GOOGLE_CLIENT_ID: ${OAUTH_GOOGLE_CLIENT_ID:-}
      OAUTH_GOOGLE_CLIENT_SECRET: ${OAUTH_GOOGLE_CLIENT_SECRET:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@bigbluebam.com}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost/b3}
      # env.ts auto-promotes COOKIE_SECURE to true whenever NODE_ENV=production
      # (which it always is in this image). Browsers silently drop a Secure
      # cookie sent over plain HTTP, so the session cookie never comes back
      # and the SPA bounces straight to /login. Wire it explicitly with a
      # safe HTTP-only default; TLS deploys set COOKIE_SECURE=true in .env.
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      INTERNAL_HELPDESK_SECRET: ${INTERNAL_HELPDESK_SECRET:?INTERNAL_HELPDESK_SECRET is required}
      # BAM-RL-E2E: opt-in flag to multiply the global rate limit ceiling for
      # parallel e2e runs. Leave unset on real production deployments.
      BBB_E2E_PERMISSIVE_RATE_LIMIT: ${BBB_E2E_PERMISSIVE_RATE_LIMIT:-}
      RATE_LIMIT_E2E_MULTIPLIER: ${RATE_LIMIT_E2E_MULTIPLIER:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - backend
      - frontend

  mcp-server:
    <<: *common
    build:
      context: .
      dockerfile: apps/mcp-server/Dockerfile
      target: production
    depends_on:
      api:
        condition: service_healthy
      bearing-api:
        condition: service_healthy
      bill-api:
        condition: service_healthy
      blank-api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      MCP_PORT: ${MCP_PORT:-3001}
      MCP_TRANSPORT: ${MCP_TRANSPORT:-streamable-http}
      API_INTERNAL_URL: http://api:4000
      HELPDESK_API_URL: http://helpdesk-api:4001
      BANTER_API_URL: http://banter-api:4002
      BEACON_API_URL: http://beacon-api:4004
      BRIEF_API_URL: http://brief-api:4005/v1
      BOLT_API_URL: http://bolt-api:4006/v1
      BEARING_API_URL: http://bearing-api:4007/v1
      BOARD_API_URL: http://board-api:4008/v1
      BOND_API_URL: http://bond-api:4009/v1
      BLAST_API_URL: http://blast-api:4010/v1
      BOOK_API_URL: http://book-api:4012/v1
      BENCH_API_URL: http://bench-api:4011/v1
      BILL_API_URL: http://bill-api:4014/v1
      BLANK_API_URL: http://blank-api:4013/v1
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:-}
      MCP_INTERNAL_API_TOKEN: ${MCP_INTERNAL_API_TOKEN:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - backend
      - frontend

  worker:
    <<: *common
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
      target: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:?}:${POSTGRES_PASSWORD:?}@postgres:5432/bigbluebam
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      S3_BUCKET: ${S3_BUCKET:-bigbluebam-uploads}
      S3_REGION: ${S3_REGION:-us-east-1}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-5}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@bigbluebam.com}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:-}
      BOLT_API_INTERNAL_URL: http://bolt-api:4006
    networks:
      - backend

  frontend:
    <<: *common
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      target: production
    depends_on:
      api:
        condition: service_healthy
      helpdesk-api:
        condition: service_healthy
      banter-api:
        condition: service_healthy
      beacon-api:
        condition: service_healthy
      brief-api:
        condition: service_healthy
      bolt-api:
        condition: service_healthy
      bearing-api:
        condition: service_healthy
      board-api:
        condition: service_healthy
      bond-api:
        condition: service_healthy
      blast-api:
        condition: service_healthy
      book-api:
        condition: service_healthy
      bench-api:
        condition: service_healthy
      blank-api:
        condition: service_healthy
      site:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      # Read by infra/nginx/entrypoint.sh to render the TLS placeholders in
      # the bind-mounted nginx-with-site.conf. See docs/local-ssl-notes.md.
      TLS_HTTP_MODE: ${TLS_HTTP_MODE:-none}
      EXT_HTTPS_PORT: ${EXT_HTTPS_PORT:-${HTTPS_PORT:-443}}
      TLS_CERT_SOURCE: ${TLS_CERT_SOURCE:-self-signed}
    volumes:
      # Bind-mount the nginx config as a TEMPLATE so the entrypoint can
      # sed-edit a working copy at /etc/nginx/conf.d/default.conf without
      # touching the read-only mount. Required for the TLS placeholder
      # substitution path.
      # Mount the templates outside /etc/nginx/templates/ — that directory
      # is auto-processed by the nginx:alpine `20-envsubst-on-templates.sh`
      # script, which would `envsubst` our `__HTTP_LISTEN__` placeholders into
      # /etc/nginx/conf.d/site.conf as-is (envsubst only handles `${var}`,
      # not `__FOO__`). nginx then refuses to start on the unsubstituted
      # directives. Mounting at a sibling path keeps our entrypoint as the
      # sole consumer of these templates.
      - ./infra/nginx/nginx-with-site.conf:/etc/nginx/bbb-templates/site.conf.template:ro
      - ./infra/nginx/tls-redirect.conf.template:/etc/nginx/bbb-templates/tls-redirect.conf.template:ro
      - ./docs/apps:/usr/share/nginx/html/docs/apps:ro
      # TLS certs (gitignored). If empty, entrypoint silently runs HTTP-only.
      - ./certs:/etc/nginx/certs:ro
      # ACME HTTP-01 challenge webroot — shared with the certbot sidecar
      # behind the "letsencrypt" compose profile.
      - ./certs/acme-challenge:/var/www/certbot
    networks:
      - frontend

  site:
    <<: *common
    build:
      context: .
      dockerfile: infra/site/Dockerfile
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - frontend

  helpdesk-api:
    <<: *common
    build:
      context: .
      dockerfile: apps/helpdesk-api/Dockerfile
      target: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      PORT: 4001
      DATABASE_URL: postgresql://${POSTGRES_USER:?}:${POSTGRES_PASSWORD:?}@postgres:5432/bigbluebam
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
      SESSION_SECRET: ${SESSION_SECRET:?}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      S3_BUCKET: ${S3_BUCKET:-bigbluebam-uploads}
      S3_REGION: ${S3_REGION:-us-east-1}
      HELPDESK_URL: ${HELPDESK_URL:-http://localhost/helpdesk}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      # See note on api.COOKIE_SECURE: helpdesk-api also issues session and
      # csrf cookies, and the same Secure-over-HTTP drop applies.
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${SMTP_FROM:-noreply@bigbluebam.io}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      BBB_API_INTERNAL_URL: http://api:4000
      INTERNAL_HELPDESK_SECRET: ${INTERNAL_HELPDESK_SECRET:?INTERNAL_HELPDESK_SECRET is required}
      # BAM-RL-E2E: opt-in flag to multiply the global rate limit ceiling for
      # parallel e2e runs. Leave unset on real production deployments.
      BBB_E2E_PERMISSIVE_RATE_LIMIT: ${BBB_E2E_PERMISSIVE_RATE_LIMIT:-}
      RATE_LIMIT_E2E_MULTIPLIER: ${RATE_LIMIT_E2E_MULTIPLIER:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - backend
      - frontend

  banter-api:
