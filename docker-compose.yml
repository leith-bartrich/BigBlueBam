      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - SESSION_SECRET=${SESSION_SECRET}
      - BBB_API_INTERNAL_URL=http://api:4000
      - NODE_ENV=production
      - PORT=4005
      - HOST=0.0.0.0
      - LOG_LEVEL=info
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost}
      - RATE_LIMIT_MAX=100
      - RATE_LIMIT_WINDOW_MS=60000
