server {
    listen 80;
    server_name _;
    client_max_body_size 25m;

    # ── Gzip ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml image/svg+xml font/woff2;

    # ── Security Headers ─────────────────────────────────────────
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Root redirect (dynamic via system_settings) ────────────────
    # Serves a tiny HTML page that queries the API for the configured
    # redirect target. Falls back to /helpdesk/ if the API is down.
    location = / {
        default_type text/html;
        return 200 '<!DOCTYPE html><html><head><meta charset="utf-8"><script>fetch("/b3/api/root-redirect").then(function(r){return r.json()}).then(function(d){location.replace(d.redirect||"/helpdesk/")}).catch(function(){location.replace("/helpdesk/")})</script></head><body></body></html>';
    }

    # ── BBB Frontend SPA ──────────────────────────────────────────
    location /b3/ {
        alias /usr/share/nginx/html/b3/;
        try_files $uri $uri/ /b3/index.html;
    }

    # ── BBB API proxy ─────────────────────────────────────────────
    location /b3/api/ {
        proxy_pass http://api:4000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── BBB WebSocket ─────────────────────────────────────────────
    location /b3/ws {
        proxy_pass http://api:4000/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # ── Helpdesk Frontend SPA ─────────────────────────────────────
    # D-010: path-based multi-tenant routing ("/helpdesk/<org>/<project>/...")
    # is handled entirely by the SPA router. Deep links like
    # /helpdesk/mage-inc/tickets/42 do not exist as real files, so the
    # try_files fallback must resolve to /helpdesk/index.html which boots
    # the SPA and its parseTenantFromPath() takes over.
    location /helpdesk/ {
        alias /usr/share/nginx/html/helpdesk/;
        try_files $uri $uri/ /helpdesk/index.html;
    }

    # ── Helpdesk API proxy ────────────────────────────────────────
    location /helpdesk/api/ {
        proxy_pass http://helpdesk-api:4001/helpdesk/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Helpdesk WebSocket ────────────────────────────────────────
    location /helpdesk/ws {
        proxy_pass http://helpdesk-api:4001/helpdesk/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # ── Banter Frontend SPA ─────────────────────────────────────────
    location /banter/ {
        alias /usr/share/nginx/html/banter/;
        try_files $uri $uri/ /banter/index.html;
    }

    # ── Banter API proxy ──────────────────────────────────────────
    location /banter/api/ {
        proxy_pass http://banter-api:4002/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Banter WebSocket ──────────────────────────────────────────
    location /banter/ws {
        proxy_pass http://banter-api:4002/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # ── Beacon Frontend SPA ──────────────────────────────────────────
    location /beacon/ {
