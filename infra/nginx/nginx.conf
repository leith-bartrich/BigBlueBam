server {
    listen 80;
    server_name _;
    client_max_body_size 25m;

    # ── Gzip ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml image/svg+xml font/woff2;

    # ── Root redirect (dynamic via system_settings) ────────────────
    # Serves a tiny HTML page that queries the API for the configured
    # redirect target. Falls back to /helpdesk/ if the API is down.
    location = / {
        default_type text/html;
        return 200 '<!DOCTYPE html><html><head><meta charset="utf-8"><script>fetch("/b3/api/root-redirect").then(function(r){return r.json()}).then(function(d){location.replace(d.redirect||"/helpdesk/")}).catch(function(){location.replace("/helpdesk/")})</script></head><body></body></html>';
    }

    # ── BBB Frontend SPA ──────────────────────────────────────────
    location /b3/ {
        alias /usr/share/nginx/html/b3/;
        try_files $uri $uri/ /b3/index.html;
    }

    # ── BBB API proxy ─────────────────────────────────────────────
    location /b3/api/ {
        proxy_pass http://api:4000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── BBB WebSocket ─────────────────────────────────────────────
    location /b3/ws {
        proxy_pass http://api:4000/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # ── Helpdesk Frontend SPA ─────────────────────────────────────
    location /helpdesk/ {
        alias /usr/share/nginx/html/helpdesk/;
        try_files $uri $uri/ /helpdesk/index.html;
    }

    # ── Helpdesk API proxy ────────────────────────────────────────
    location /helpdesk/api/ {
        proxy_pass http://helpdesk-api:4001/helpdesk/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Helpdesk WebSocket ────────────────────────────────────────
    location /helpdesk/ws {
        proxy_pass http://helpdesk-api:4001/helpdesk/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # ── Banter Frontend SPA ─────────────────────────────────────────
    location /banter/ {
        alias /usr/share/nginx/html/banter/;
        try_files $uri $uri/ /banter/index.html;
    }

    # ── Banter API proxy ──────────────────────────────────────────
    location /banter/api/ {
        proxy_pass http://banter-api:4002/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Banter WebSocket ──────────────────────────────────────────
    location /banter/ws {
        proxy_pass http://banter-api:4002/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # ── Beacon Frontend SPA ──────────────────────────────────────────
    location /beacon/ {
        alias /usr/share/nginx/html/beacon/;
        try_files $uri $uri/ /beacon/index.html;
    }

    # ── Beacon API proxy ────────────────────────────────────────────
    location /beacon/api/ {
        proxy_pass http://beacon-api:4004/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Brief Frontend SPA ──────────────────────────────────────────
    location /brief/ {
        alias /usr/share/nginx/html/brief/;
        try_files $uri $uri/ /brief/index.html;
    }

    # ── Brief API proxy ──────────────────────────────────────────────
    location /brief/api/ {
        proxy_pass http://brief-api:4005/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Brief WebSocket (Yjs collaboration) ──────────────────────────
    location /brief/ws {
        proxy_pass http://brief-api:4005/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Bolt Frontend SPA ───────────────────────────────────────────
    location /bolt/ {
        alias /usr/share/nginx/html/bolt/;
        try_files $uri $uri/ /bolt/index.html;
    }

    # ── Bolt API proxy ──────────────────────────────────────────────
    location /bolt/api/ {
        proxy_pass http://bolt-api:4006/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Bearing Goals & OKRs SPA ─────────────────────────────────────────
    location /bearing/ {
        alias /usr/share/nginx/html/bearing/;
        try_files $uri $uri/ /bearing/index.html;
    }

    # ── Bearing API proxy ────────────────────────────────────────────
    location /bearing/api/ {
        proxy_pass http://bearing-api:4007/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Board SPA ────────────────────────────────────────────────────
    location /board/ {
        alias /usr/share/nginx/html/board/;
        try_files $uri $uri/ /board/index.html;
    }

    # ── Board API proxy ──────────────────────────────────────────────
    location /board/api/ {
        proxy_pass http://board-api:4008/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Board WebSocket (tldraw collaboration + chat) ────────────────
    location /board/ws {
        proxy_pass http://board-api:4008/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── File serving (shared, proxied through BBB API) ────────────
    location /files/ {
        proxy_pass http://api:4000/files/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ── MCP server ────────────────────────────────────────────────
    location /mcp/ {
        proxy_pass http://mcp-server:3001/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── BBB helpdesk-api proxy (for BBB frontend's helpdesk panel) ─
    location /helpdesk-api/ {
        proxy_pass http://helpdesk-api:4001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Static asset caching (exclude API/proxy paths) ────────────
    location ~* ^/(b3|helpdesk|banter|beacon|brief|bolt|bearing|board)/assets/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
