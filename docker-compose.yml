x-common: &common
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  # ── Infrastructure ──────────────────────────────────────────────
  postgres:
    <<: *common
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bigbluebam
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bigbluebam} -d bigbluebam"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - backend

  redis:
    <<: *common
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-changeme}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend

  minio:
    <<: *common
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - backend

  # ── Application ─────────────────────────────────────────────────
  api:
    <<: *common
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: production
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:?}:${POSTGRES_PASSWORD:?}@postgres:5432/bigbluebam
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-bigbluebam-uploads}
      S3_REGION: ${S3_REGION:-us-east-1}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      OAUTH_GITHUB_CLIENT_ID: ${OAUTH_GITHUB_CLIENT_ID:-}
      OAUTH_GITHUB_CLIENT_SECRET: ${OAUTH_GITHUB_CLIENT_SECRET:-}
      OAUTH_GOOGLE_CLIENT_ID: ${OAUTH_GOOGLE_CLIENT_ID:-}
      OAUTH_GOOGLE_CLIENT_SECRET: ${OAUTH_GOOGLE_CLIENT_SECRET:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@bigbluebam.com}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost/b3}
      INTERNAL_HELPDESK_SECRET: ${INTERNAL_HELPDESK_SECRET:?INTERNAL_HELPDESK_SECRET is required}
    ports:
      - "${API_PORT:-4000}:4000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - backend
      - frontend

  mcp-server:
    <<: *common
    build:
      context: .
      dockerfile: apps/mcp-server/Dockerfile
      target: production
    depends_on:
      api:
        condition: service_healthy
      bearing-api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      MCP_PORT: ${MCP_PORT:-3001}
      MCP_TRANSPORT: ${MCP_TRANSPORT:-streamable-http}
      API_INTERNAL_URL: http://api:4000
      HELPDESK_API_URL: http://helpdesk-api:4001
      BEACON_API_URL: http://beacon-api:4004
      BOLT_API_URL: http://bolt-api:4006/v1
      BEARING_API_URL: http://bearing-api:4007/v1
      BOARD_API_URL: http://board-api:4008/v1
      BOND_API_URL: http://bond-api:4009/v1
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
    ports:
      - "${MCP_PORT:-3001}:3001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - backend
      - frontend

  worker:
    <<: *common
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
      target: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:?}:${POSTGRES_PASSWORD:?}@postgres:5432/bigbluebam
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-bigbluebam-uploads}
      S3_REGION: ${S3_REGION:-us-east-1}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-5}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@bigbluebam.com}
    networks:
      - backend

  frontend:
    <<: *common
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      target: production
    depends_on:
      api:
        condition: service_healthy
      helpdesk-api:
        condition: service_healthy
      banter-api:
        condition: service_healthy
      beacon-api:
        condition: service_healthy
      brief-api:
        condition: service_healthy
      bolt-api:
        condition: service_healthy
      bearing-api:
        condition: service_healthy
      board-api:
        condition: service_healthy
      bond-api:
        condition: service_healthy
      site:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./infra/nginx/nginx-with-site.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - frontend

  site:
    <<: *common
    build:
      context: .
      dockerfile: infra/site/Dockerfile
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - frontend

  helpdesk-api:
    <<: *common
    build:
      context: .
      dockerfile: apps/helpdesk-api/Dockerfile
      target: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      PORT: 4001
      DATABASE_URL: postgresql://${POSTGRES_USER:?}:${POSTGRES_PASSWORD:?}@postgres:5432/bigbluebam
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      SESSION_SECRET: ${SESSION_SECRET:?}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-bigbluebam-uploads}
      S3_REGION: ${S3_REGION:-us-east-1}
      HELPDESK_URL: ${HELPDESK_URL:-http://localhost/helpdesk}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${SMTP_FROM:-noreply@bigbluebam.io}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      BBB_API_INTERNAL_URL: http://api:4000
      INTERNAL_HELPDESK_SECRET: ${INTERNAL_HELPDESK_SECRET:?INTERNAL_HELPDESK_SECRET is required}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - backend
      - frontend

  banter-api:
    <<: *common
    build:
      context: .
      dockerfile: apps/banter-api/Dockerfile
      target: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      PORT: 4002
      DATABASE_URL: postgresql://${POSTGRES_USER:?}:${POSTGRES_PASSWORD:?}@postgres:5432/bigbluebam
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      SESSION_SECRET: ${SESSION_SECRET:?}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-bigbluebam-uploads}
      S3_REGION: ${S3_REGION:-us-east-1}
      LIVEKIT_HOST: http://livekit:7880
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-secret}
      LIVEKIT_WS_URL: ${LIVEKIT_WS_URL:-ws://localhost:7880}
      BBB_API_INTERNAL_URL: http://api:4000
      VOICE_AGENT_URL: http://voice-agent:4003
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4002/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - backend
      - frontend

  beacon-api:
    <<: *common
    build:
      context: .
      dockerfile: apps/beacon-api/Dockerfile
      target: production
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }
      qdrant: { condition: service_healthy }
    environment:
      NODE_ENV: production
      PORT: 4004
      DATABASE_URL: postgresql://${POSTGRES_USER:?}:${POSTGRES_PASSWORD:?}@postgres:5432/bigbluebam
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      SESSION_SECRET: ${SESSION_SECRET:?}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-bigbluebam-uploads}
      S3_REGION: ${S3_REGION:-us-east-1}
      QDRANT_URL: http://qdrant:6333
      BBB_API_INTERNAL_URL: http://api:4000
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4004/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - backend
      - frontend

  brief-api:
    <<: *common
    build:
      context: .
      dockerfile: apps/brief-api/Dockerfile
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-bigbluebam}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - SESSION_SECRET=${SESSION_SECRET}
      - BBB_API_INTERNAL_URL=http://api:4000
      - NODE_ENV=production
      - PORT=4005
      - HOST=0.0.0.0
      - LOG_LEVEL=info
      - CORS_ORIGIN=*
      - RATE_LIMIT_MAX=100
      - RATE_LIMIT_WINDOW_MS=60000
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4005/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - backend
      - frontend

  bolt-api:
    <<: *common
    build:
      context: .
      dockerfile: apps/bolt-api/Dockerfile
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-bigbluebam}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - SESSION_SECRET=${SESSION_SECRET}
      - BBB_API_INTERNAL_URL=http://api:4000
      - MCP_INTERNAL_URL=http://mcp-server:3001
      - NODE_ENV=production
      - PORT=4006
      - HOST=0.0.0.0
      - LOG_LEVEL=info
      - CORS_ORIGIN=*
      - RATE_LIMIT_MAX=100
      - RATE_LIMIT_WINDOW_MS=60000
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4006/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - backend
      - frontend

  bearing-api:
    <<: *common
    build:
      context: .
      dockerfile: apps/bearing-api/Dockerfile
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-bigbluebam}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - SESSION_SECRET=${SESSION_SECRET}
      - BBB_API_INTERNAL_URL=http://api:4000
      - NODE_ENV=production
      - PORT=4007
      - HOST=0.0.0.0
      - LOG_LEVEL=info
      - CORS_ORIGIN=*
      - RATE_LIMIT_MAX=100
      - RATE_LIMIT_WINDOW_MS=60000
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4007/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - backend
      - frontend

  board-api:
    <<: *common
    build:
      context: .
      dockerfile: apps/board-api/Dockerfile
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-bigbluebam}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - SESSION_SECRET=${SESSION_SECRET}
      - BBB_API_INTERNAL_URL=http://api:4000
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:-devkey}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:-secret}
      - LIVEKIT_URL=${LIVEKIT_WS_URL:-ws://localhost:7880}
      - NODE_ENV=production
      - PORT=4008
      - HOST=0.0.0.0
      - LOG_LEVEL=info
      - CORS_ORIGIN=*
      - RATE_LIMIT_MAX=100
      - RATE_LIMIT_WINDOW_MS=60000
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4008/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - backend
      - frontend

  bond-api:
    <<: *common
    build:
      context: .
      dockerfile: apps/bond-api/Dockerfile
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-bigbluebam}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - SESSION_SECRET=${SESSION_SECRET}
      - BBB_API_INTERNAL_URL=http://api:4000
      - NODE_ENV=production
      - PORT=4009
      - HOST=0.0.0.0
      - LOG_LEVEL=info
      - CORS_ORIGIN=*
      - RATE_LIMIT_MAX=100
      - RATE_LIMIT_WINDOW_MS=60000
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4009/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - backend
      - frontend

  qdrant:
    <<: *common
    image: qdrant/qdrant:latest
    volumes:
      - qdrantdata:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - backend

  livekit:
    <<: *common
    image: livekit/livekit-server:latest
    command: --config /etc/livekit.yaml
    ports:
      - "7880:7880"
      - "7881:7881"
    volumes:
      - ./infra/livekit/livekit.yaml:/etc/livekit.yaml:ro
    networks:
      - backend
      - frontend

  voice-agent:
    <<: *common
    build:
      context: .
      dockerfile: apps/voice-agent/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
    environment:
      LIVEKIT_URL: ws://livekit:7880
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4003/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - backend

  # ── One-shot ────────────────────────────────────────────────────
  # Applies all pending SQL migrations from /app/migrations (baked into the
  # api image from infra/postgres/migrations). Tracks applied migrations in
  # the `schema_migrations` table. Idempotent: rerunning is a no-op when the
  # DB is already up to date. Every DB-using service declares this as a
  # `service_completed_successfully` dependency so migrations ALWAYS run
  # before app code that assumes the current schema.
  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: production
    command: ["node", "dist/migrate.js"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:?}:${POSTGRES_PASSWORD:?}@postgres:5432/bigbluebam
      MIGRATIONS_DIR: /app/migrations
    restart: "no"
    networks:
      - backend

volumes:
  pgdata:
  redisdata:
  miniodata:
  qdrantdata:

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge
