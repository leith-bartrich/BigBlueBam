<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 520" width="820" height="520" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <filter id="ds" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="820" height="520" fill="#F8FAFC" rx="12"/>

  <!-- Title -->
  <text x="410" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#1E293B">BigBlueBam — Container Architecture</text>

  <!-- ───── Client Layer ───── -->
  <rect x="270" y="48" width="280" height="44" rx="8" fill="#F1F5F9" stroke="#CBD5E1" filter="url(#ds)"/>
  <text x="410" y="75" text-anchor="middle" font-size="13" font-weight="600" fill="#475569">Browser / MCP Client</text>

  <!-- Arrow down -->
  <line x1="410" y1="92" x2="410" y2="118" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#94A3B8"/></marker></defs>

  <!-- ───── App Containers ───── -->
  <!-- Frontend -->
  <rect x="30" y="124" width="170" height="80" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5" filter="url(#ds)"/>
  <text x="115" y="152" text-anchor="middle" font-size="13" font-weight="700" fill="#1E40AF">Frontend</text>
  <text x="115" y="170" text-anchor="middle" font-size="10" fill="#3B82F6">nginx + React SPA</text>
  <text x="115" y="186" text-anchor="middle" font-size="10" fill="#64748B">:80 / :443</text>

  <!-- API -->
  <rect x="230" y="124" width="170" height="80" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5" filter="url(#ds)"/>
  <text x="315" y="152" text-anchor="middle" font-size="13" font-weight="700" fill="#1E40AF">API</text>
  <text x="315" y="170" text-anchor="middle" font-size="10" fill="#3B82F6">Fastify + WebSocket</text>
  <text x="315" y="186" text-anchor="middle" font-size="10" fill="#64748B">:4000</text>

  <!-- MCP Server -->
  <rect x="430" y="124" width="170" height="80" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5" filter="url(#ds)"/>
  <text x="515" y="152" text-anchor="middle" font-size="13" font-weight="700" fill="#1E40AF">MCP Server</text>
  <text x="515" y="170" text-anchor="middle" font-size="10" fill="#3B82F6">MCP SDK + SSE</text>
  <text x="515" y="186" text-anchor="middle" font-size="10" fill="#64748B">:3001</text>

  <!-- Worker -->
  <rect x="630" y="124" width="170" height="80" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5" filter="url(#ds)"/>
  <text x="715" y="152" text-anchor="middle" font-size="13" font-weight="700" fill="#1E40AF">Worker</text>
  <text x="715" y="170" text-anchor="middle" font-size="10" fill="#3B82F6">BullMQ processor</text>
  <text x="715" y="186" text-anchor="middle" font-size="10" fill="#64748B">(no port)</text>

  <!-- ───── Internal Network Bar ───── -->
  <rect x="30" y="230" width="770" height="30" rx="6" fill="#E2E8F0"/>
  <text x="410" y="250" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">Internal Docker Network</text>

  <!-- Arrows from app to network -->
  <line x1="115" y1="204" x2="115" y2="230" stroke="#94A3B8" stroke-width="1.5"/>
  <line x1="315" y1="204" x2="315" y2="230" stroke="#94A3B8" stroke-width="1.5"/>
  <line x1="515" y1="204" x2="515" y2="230" stroke="#94A3B8" stroke-width="1.5"/>
  <line x1="715" y1="204" x2="715" y2="230" stroke="#94A3B8" stroke-width="1.5"/>

  <!-- ───── Data Containers ───── -->
  <!-- PostgreSQL -->
  <rect x="100" y="290" width="200" height="90" rx="8" fill="#DCFCE7" stroke="#22C55E" stroke-width="1.5" filter="url(#ds)"/>
  <text x="200" y="320" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">PostgreSQL 16</text>
  <text x="200" y="340" text-anchor="middle" font-size="10" fill="#22C55E">Primary database</text>
  <text x="200" y="356" text-anchor="middle" font-size="10" fill="#64748B">:5432 &bull; Vol: pgdata</text>

  <!-- Redis -->
  <rect x="330" y="290" width="200" height="90" rx="8" fill="#DCFCE7" stroke="#22C55E" stroke-width="1.5" filter="url(#ds)"/>
  <text x="430" y="320" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">Redis 7</text>
  <text x="430" y="340" text-anchor="middle" font-size="10" fill="#22C55E">Cache, PubSub, Queue</text>
  <text x="430" y="356" text-anchor="middle" font-size="10" fill="#64748B">:6379 &bull; Vol: redisdata</text>

  <!-- MinIO -->
  <rect x="560" y="290" width="200" height="90" rx="8" fill="#DCFCE7" stroke="#22C55E" stroke-width="1.5" filter="url(#ds)"/>
  <text x="660" y="320" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">MinIO</text>
  <text x="660" y="340" text-anchor="middle" font-size="10" fill="#22C55E">S3-compatible storage</text>
  <text x="660" y="356" text-anchor="middle" font-size="10" fill="#64748B">:9000 &bull; Vol: miniodata</text>

  <!-- Arrows from network to data -->
  <line x1="200" y1="260" x2="200" y2="290" stroke="#94A3B8" stroke-width="1.5"/>
  <line x1="430" y1="260" x2="430" y2="290" stroke="#94A3B8" stroke-width="1.5"/>
  <line x1="660" y1="260" x2="660" y2="290" stroke="#94A3B8" stroke-width="1.5"/>

  <!-- ───── Connection Labels ───── -->
  <text x="115" y="220" text-anchor="middle" font-size="9" fill="#64748B">HTTP</text>
  <text x="315" y="220" text-anchor="middle" font-size="9" fill="#64748B">REST+WS</text>
  <text x="515" y="220" text-anchor="middle" font-size="9" fill="#64748B">SSE/HTTP</text>
  <text x="715" y="220" text-anchor="middle" font-size="9" fill="#64748B">Redis Queue</text>

  <!-- ───── Legend ───── -->
  <rect x="30" y="420" width="760" height="80" rx="8" fill="#F8FAFC" stroke="#E2E8F0"/>
  <text x="50" y="445" font-size="12" font-weight="600" fill="#1E293B">Legend:</text>
  <rect x="50" y="455" width="16" height="16" rx="3" fill="#DBEAFE" stroke="#3B82F6"/>
  <text x="74" y="467" font-size="11" fill="#475569">Application Container (stateless, horizontally scalable)</text>
  <rect x="400" y="455" width="16" height="16" rx="3" fill="#DCFCE7" stroke="#22C55E"/>
  <text x="424" y="467" font-size="11" fill="#475569">Data Container (persistent, vertically scalable)</text>
  <text x="50" y="490" font-size="10" fill="#94A3B8">All services run via: docker compose up -d &bull; Data services swappable for managed cloud equivalents</text>
</svg>
