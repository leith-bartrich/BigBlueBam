# Strip the port from $host so a redirect from a remapped HTTP_PORT (e.g.
# the operator picked HTTP_PORT=8080 / HTTPS_PORT=8443 to avoid clashing
# with their NAS admin UI) can re-target the correct external HTTPS port
# without inheriting the wrong port from the original Host header. Used by
# the auxiliary redirect server block when TLS_HTTP_MODE=redirect — see
# infra/nginx/tls-redirect.conf.template and entrypoint.sh.
map $host $host_no_port { ~^([^:]+) $1; default $host; }

server {
    # entrypoint.sh fills these in based on cert presence and TLS_HTTP_MODE:
    #   __HTTP_LISTEN__    → "listen 80;" or "" (omitted on redirect/https-only).
    #   __TLS_LISTEN_BLOCK__ → "" or the listen 443 ssl + ssl_certificate +
    #                         HSTS add_header lines.
    __HTTP_LISTEN__
    __TLS_LISTEN_BLOCK__
    server_name _;
    client_max_body_size 25m;

    # ── Gzip ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml image/svg+xml font/woff2;

    # ── Security Headers ─────────────────────────────────────────
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    # Permissions-Policy: allow same-origin pages to request camera /
    # microphone / display-capture (screen share) for voice + video calls.
    # Previous value was `camera=(), microphone=()` — empty allowlists
    # which the browser reads as "no origin allowed", silently blocking
    # getUserMedia() even after the user clicks Allow on the OS prompt.
    # `(self)` permits our own origin without leaking the grant to
    # embedded iframes.
    add_header Permissions-Policy "camera=(self), microphone=(self), display-capture=(self), geolocation=()" always;

    # ── ACME HTTP-01 challenge (Let's Encrypt) ────────────────────
    # Always present so the same nginx config works for all TLS modes;
    # the path is unused unless the certbot sidecar (compose profile
    # "letsencrypt") is running and writing challenge tokens.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── App-prefix redirect helpers ─────────────────────────────────
    # nginx's prefix matching is strict: `location /b3/` does NOT match
    # `/b3` (no trailing slash). Without these exact-match redirects, a
    # user hitting `http://host/b3` falls through to `location /` which
    # proxies to the marketing site, which then redirects to `/` — the
    # symptom users reported as "going to /b3 from a LAN client always
    # bounces to root." Each `location = /<app>` returns a 301 to the
    # canonical trailing-slash form. `$request_uri` preserves any query
    # string the user landed with.
    location = /b3       { return 301 /b3/; }
    location = /banter   { return 301 /banter/; }
    location = /beacon   { return 301 /beacon/; }
    location = /brief    { return 301 /brief/; }
    location = /bolt     { return 301 /bolt/; }
    location = /bearing  { return 301 /bearing/; }
    location = /board    { return 301 /board/; }
    location = /bond     { return 301 /bond/; }
    location = /blast    { return 301 /blast/; }
    location = /bench    { return 301 /bench/; }
    location = /blank    { return 301 /blank/; }
    location = /bill     { return 301 /bill/; }
    location = /book     { return 301 /book/; }
    location = /helpdesk { return 301 /helpdesk/; }

    # ── BBB Frontend SPA ──────────────────────────────────────────
    location /b3/ {
        alias /usr/share/nginx/html/b3/;
        try_files $uri $uri/ /b3/index.html;
    }

    # ── BBB API proxy ─────────────────────────────────────────────
    location /b3/api/ {
        proxy_pass http://api:4000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── BBB WebSocket ─────────────────────────────────────────────
    location /b3/ws {
        proxy_pass http://api:4000/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # ── Helpdesk Frontend SPA ─────────────────────────────────────
    # D-010: path-based multi-tenant routing ("/helpdesk/<org>/<project>/...")
    # is handled entirely by the SPA router. Deep links like
    # /helpdesk/mage-inc/tickets/42 do not exist as real files, so the
    # try_files fallback must resolve to /helpdesk/index.html which boots
    # the SPA and its parseTenantFromPath() takes over. The /helpdesk/api/
    # and /helpdesk/ws locations below take longest-prefix precedence and
    # are unaffected by this fallback.
    location /helpdesk/ {
        alias /usr/share/nginx/html/helpdesk/;
        try_files $uri $uri/ /helpdesk/index.html;
    }

    # ── Helpdesk API proxy ────────────────────────────────────────
    location /helpdesk/api/ {
        proxy_pass http://helpdesk-api:4001/helpdesk/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Helpdesk WebSocket ────────────────────────────────────────
    location /helpdesk/ws {
        proxy_pass http://helpdesk-api:4001/helpdesk/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # ── Banter Frontend SPA ─────────────────────────────────────────
    location /banter/ {
        alias /usr/share/nginx/html/banter/;
        try_files $uri $uri/ /banter/index.html;
    }

    # ── Banter API proxy ──────────────────────────────────────────
    location /banter/api/ {
        proxy_pass http://banter-api:4002/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Banter WebSocket ──────────────────────────────────────────
    location /banter/ws {
        proxy_pass http://banter-api:4002/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # ── Beacon Frontend SPA ──────────────────────────────────────────
    location /beacon/ {
        alias /usr/share/nginx/html/beacon/;
        try_files $uri $uri/ /beacon/index.html;
    }

    # ── Beacon API proxy ────────────────────────────────────────────
    location /beacon/api/ {
        proxy_pass http://beacon-api:4004/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Brief Frontend SPA ──────────────────────────────────────────
    location /brief/ {
        alias /usr/share/nginx/html/brief/;
        try_files $uri $uri/ /brief/index.html;
    }

    # ── Brief API proxy ──────────────────────────────────────────────
    location /brief/api/ {
        proxy_pass http://brief-api:4005/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Brief WebSocket (Yjs collaboration) ──────────────────────────
    location /brief/ws {
        proxy_pass http://brief-api:4005/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Bolt Frontend SPA ───────────────────────────────────────────
    location /bolt/ {
        alias /usr/share/nginx/html/bolt/;
        try_files $uri $uri/ /bolt/index.html;
    }

    # ── Bolt API proxy ──────────────────────────────────────────────
    location /bolt/api/ {
        proxy_pass http://bolt-api:4006/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Bearing SPA ─────────────────────────────────────────────────
    location /bearing/ {
        alias /usr/share/nginx/html/bearing/;
        try_files $uri $uri/ /bearing/index.html;
    }

    # ── Bearing API proxy ────────────────────────────────────────────
    location /bearing/api/ {
        proxy_pass http://bearing-api:4007/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Board SPA ────────────────────────────────────────────────────
    location /board/ {
        alias /usr/share/nginx/html/board/;
        try_files $uri $uri/ /board/index.html;
    }

    # ── Board API proxy ──────────────────────────────────────────────
    location /board/api/ {
        proxy_pass http://board-api:4008/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Board WebSocket (tldraw collaboration + chat) ────────────────
    location /board/ws {
        proxy_pass http://board-api:4008/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Blast Frontend SPA ────────────────────────────────────────
    location /blast/ {
        alias /usr/share/nginx/html/blast/;
        try_files $uri $uri/ /blast/index.html;
    }

    # ── Blast API proxy ─────────────────────────────────────────────
    location /blast/api/ {
        proxy_pass http://blast-api:4010/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Blast tracking endpoints (short paths for email links) ─────
    location /t/ {
        proxy_pass http://blast-api:4010/t/;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /unsub/ {
        proxy_pass http://blast-api:4010/unsub/;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Bond Frontend SPA ─────────────────────────────────────────
    location /bond/ {
        alias /usr/share/nginx/html/bond/;
        try_files $uri $uri/ /bond/index.html;
    }

    # ── Bond API proxy ──────────────────────────────────────────────
    location /bond/api/ {
        proxy_pass http://bond-api:4009/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Bench Frontend SPA ────────────────────────────────────────
    location /bench/ {
        alias /usr/share/nginx/html/bench/;
        try_files $uri $uri/ /bench/index.html;
    }

    # ── Bench API proxy ─────────────────────────────────────────────
    location /bench/api/ {
        proxy_pass http://bench-api:4011/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Blank Frontend SPA ─────────────────────────────────────────
    location /blank/ {
        alias /usr/share/nginx/html/blank/;
        try_files $uri $uri/ /blank/index.html;
    }

    # ── Blank API proxy ──────────────────────────────────────────────
    location /blank/api/ {
        proxy_pass http://blank-api:4013/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Public form endpoints (no auth) ──────────────────────────────
    location /forms/ {
        proxy_pass http://blank-api:4013/forms/;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Bill Frontend SPA ───────────────────────────────────────────
    location /bill/ {
        alias /usr/share/nginx/html/bill/;
        try_files $uri $uri/ /bill/index.html;
    }

    # ── Bill API proxy ───────────────────────────────────────────
    location /bill/api/ {
        proxy_pass http://bill-api:4014/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Bill public invoice pages ────────────────────────────────
    location /invoice/ {
        proxy_pass http://bill-api:4014/invoice/;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Book Frontend SPA ──────────────────────────────────────────
    location /book/ {
        alias /usr/share/nginx/html/book/;
        try_files $uri $uri/ /book/index.html;
    }

    # ── Book API proxy ───────────────────────────────────────────
    location /book/api/ {
        proxy_pass http://book-api:4012/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Book public booking pages ────────────────────────────────
    location /meet/ {
        proxy_pass http://book-api:4012/meet/;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── File serving (shared, proxied through BBB API) ────────────
    location /files/ {
        proxy_pass http://api:4000/files/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ── MCP server ────────────────────────────────────────────────
    # The mcp-server listens on `/mcp` (Streamable HTTP transport) at the
    # upstream. Exact-match locations route `/mcp` and `/mcp/` straight to
    # that upstream path so MCP clients can connect to `https://DOMAIN/mcp/`
    # without suffixing `/mcp`. Subpaths (/mcp/sse, /mcp/messages,
    # /mcp/health, /mcp/tools/call) fall through to the prefix location
    # below, which strips `/mcp/` so the upstream sees `/sse`, `/messages`,
    # `/health`, `/tools/call` — matching apps/mcp-server/src/server.ts.
    location = /mcp {
        proxy_pass http://mcp-server:3001/mcp;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_read_timeout 86400s;
    }
    location = /mcp/ {
        proxy_pass http://mcp-server:3001/mcp;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_read_timeout 86400s;
    }
    location /mcp/ {
        proxy_pass http://mcp-server:3001/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_read_timeout 86400s;
    }

    # ── BBB helpdesk-api proxy (for BBB frontend's helpdesk panel) ─
    location /helpdesk-api/ {
        proxy_pass http://helpdesk-api:4001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Documentation static files (in-app Help viewer) ───────────
    # Serves docs/apps/*/guide.md and related assets. The HelpViewer
    # component in each frontend app fetches /docs/apps/{slug}/guide.md.
    location /docs/ {
        alias /usr/share/nginx/html/docs/;
        try_files $uri $uri/ =404;
        add_header Cache-Control "public, max-age=3600";
    }

    # ── Static asset caching (exclude API/proxy paths) ────────────
    location ~* ^/(b3|helpdesk|banter|beacon|brief|bolt|bearing|board|bond|blast|blank|book|bench)/assets/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Marketing site (root domain) ──────────────────────────────
    # Everything not claimed by one of the prefix locations above falls
    # through to the site service. Prefix matches (/b3/, /helpdesk/,
    # /banter/, /files/, /mcp/, /helpdesk-api/) take precedence over
    # this plain `/` prefix per nginx's longest-prefix-wins rule.
    #
    # The marketing site is intentionally embeddable in iframes from any
    # origin so press-release viewers and partner pages can include it.
    # nginx's add_header does not inherit from the server block once a
    # location declares its own, so the other security headers must be
    # repeated here. X-Frame-Options is omitted and CSP frame-ancestors
    # is set to * to override the server-level DENY.
    location / {
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        # Mirror the server-level Permissions-Policy. add_header does not
        # inherit once a location block declares its own (nginx footgun).
        add_header Permissions-Policy "camera=(self), microphone=(self), display-capture=(self), geolocation=()" always;
        add_header Content-Security-Policy "frame-ancestors *" always;
        proxy_pass http://site:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
