<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="BigBlueBam — The project management suite built for human-AI teams. Kanban boards, sprint planning, team messaging, helpdesk, and 86 MCP tools. Self-hosted, one command to deploy." />
    <title>BigBlueBam — Project Management Built for Human-AI Teams</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body>
    <script>
      // Check SuperUser root redirect setting before React loads
      if (location.pathname === '/' || location.pathname === '') {
        fetch('/b3/api/root-redirect')
          .then(function(r) { return r.json(); })
          .then(function(d) { if (d.redirect) location.replace(d.redirect); })
          .catch(function() {});
      }
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
