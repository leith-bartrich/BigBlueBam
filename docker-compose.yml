  # Let's Encrypt sidecar. Gated behind the "letsencrypt" compose profile so
  # it only spins up when the operator picked that cert source. Issues the
  # initial cert via webroot challenge against nginx (the frontend service
  # serves /.well-known/acme-challenge/ unconditionally) and writes certs to
  # ./certs/letsencrypt/, which the deploy script symlinks into
  # ./certs/local.{crt,key} for nginx to pick up. Renewal is driven by a
  # host-side cron entry the deploy script writes — NOT by an in-container
  # loop, because that would require mounting the docker socket into this
  # sidecar (anti-pattern; see docs/local-ssl-notes.md).
  certbot:
    image: certbot/certbot:latest
    profiles: ["letsencrypt"]
    volumes:
      - ./certs/letsencrypt:/etc/letsencrypt
      - ./certs/acme-challenge:/var/www/certbot
    # The deploy script invokes certbot with explicit args via
    # `docker compose run --rm certbot ...` so this default command is just
    # a safe no-op for a manual `docker compose up certbot`.
    entrypoint: ["sh", "-c"]
    command: ["echo 'certbot sidecar ready; invoke via docker compose run --rm certbot'"]

  livekit:
    <<: *common
    image: livekit/livekit-server:latest
    command: --config /etc/livekit.yaml
    ports:
      # Overridable by the advanced-port-mapping flow in scripts/deploy/main.mjs;
      # defaults match the upstream LiveKit defaults so existing installs
      # are unaffected. Container-internal ports stay at 7880/7881.
      - "${LIVEKIT_RTC_PORT:-7880}:7880"
      - "${LIVEKIT_TCP_PORT:-7881}:7881"
    volumes:
