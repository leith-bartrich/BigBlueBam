  # ── One-shot migration runner ─────────────────────────────────────────────
  # Reads infra/postgres/migrations/ and applies any unapplied SQL files in
  # filename order. Tracks applied migrations in the `schema_migrations`
  # table with a SHA-256 checksum per file (header comments stripped before
  # hashing so editing -- Why / -- Client impact lines does not invalidate
  # an applied migration). Idempotent: rerunning is a no-op when the DB is
  # already up to date. Every DB-using service declares this as a
  # `service_completed_successfully` dependency so migrations ALWAYS run
  # before app code that assumes the current schema.
  #
  # GOTCHA: the sidecar is cached on subsequent `docker compose up -d`.
  # `service_completed_successfully` dependencies are evaluated against the
  # FIRST successful exit on a given stack lifetime. Once `migrate` has run
  # to completion, subsequent `docker compose up -d <service>` invocations
  # see the cached completion and DO NOT re-run the sidecar even if you
  # just dropped a new SQL file into infra/postgres/migrations/. Simply
  # rebuilding `bolt-api` (or any other dependent service) will not trigger
  # the migration. Run the sidecar explicitly:
  #
  #   docker compose run --rm migrate                              # apply new migrations
  #   docker compose build <app-that-uses-the-new-column>          # rebuild affected app
  #   docker compose up -d --force-recreate <app>                  # restart it
  #
  # See CLAUDE.md "Applying a new migration to a long-running stack" for
  # the full incident history (template_strict, bolt_graph_column,
  # bond_deal_rotting_alerted) and verification commands.
  #
  # NOTE ON THE BIND MOUNT: `infra/postgres/migrations` is also COPYed into
  # the production image by apps/api/Dockerfile so Helm/k8s deployments ship
  # a self-contained image. For `docker compose` on developer hosts (esp.
  # Windows/WSL2 where the build context has been observed to silently drop
  # newly-added SQL files from COPY layers), the bind mount below overrides
  # the baked-in `/app/migrations` directory with the live host tree. This
  # makes new migration files available to `docker compose run --rm migrate`
  # instantly without a rebuild and bypasses the WSL2 file-sync class of
  # bugs that caused migrations 0043/0044/0045 to be silently missing from
  # the image earlier in development. Mounted read-only so the container
  # cannot corrupt host source.
  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: production
    command: ["node", "dist/migrate.js"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:?}:${POSTGRES_PASSWORD:?}@postgres:5432/bigbluebam
      MIGRATIONS_DIR: /app/migrations
    volumes:
      - ./infra/postgres/migrations:/app/migrations:ro
    restart: "no"
    networks:
      - backend

  # ── One-shot seed runner (opt-in via --profile seed) ─────────────────────
  # Reuses the api production image (has node + argon2 + postgres-js in
  # /app/node_modules) and runs scripts/seed-all.mjs as the entry point.
  # The scripts/ directory is bind-mounted live, mirroring the migrate
  # sidecar, so new seed files are visible without a rebuild.
  #
  # Invocation:
  #   docker compose --profile seed run --rm seed
  #
  # The profile tag keeps this out of the normal `docker compose up -d`
  # lifecycle; it only runs when the `seed` profile is explicitly
  # selected. Depends on migrate completing and api being healthy so we
  # know the schema is current before inserting anything.
  seed:
    profiles: ["seed"]
    image: bigbluebam-api
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: production
    command: ["node", "/app/scripts/seed-all.mjs"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:?}:${POSTGRES_PASSWORD:?}@postgres:5432/bigbluebam
      SEED_ORG_SLUG: ${SEED_ORG_SLUG:-}
      BOLT_API_INTERNAL_URL: http://bolt-api:4006
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:-}
    volumes:
      - ./scripts:/app/scripts:ro
    restart: "no"
    networks:
      - backend

volumes:
  pgdata:
  redisdata:
  miniodata:
  qdrantdata:

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge
