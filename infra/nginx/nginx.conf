        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Blast Frontend SPA ────────────────────────────────────────
    location /blast/ {
        alias /usr/share/nginx/html/blast/;
        try_files $uri $uri/ /blast/index.html;
    }

    # ── Blast API proxy ─────────────────────────────────────────────
    location /blast/api/ {
