# Overlay that turns on the marketing site served at the root domain.
#
# Applied only when the ./site directory is checked out — the deploy scripts
# (scripts/deploy.sh and scripts/deploy.ps1) detect it and pass `-f
# docker-compose.site.yml` after the base compose file. When this overlay is
# NOT applied the base nginx config is used, which redirects `/` to
# `/helpdesk/`.
#
# The `site/` directory itself lives in its own private git repo and is
# listed in the public repo's .gitignore — contributors without access to
# the private repo simply won't have the directory and the overlay stays
# off by default.
services:
  site:
    build:
      context: .
      dockerfile: infra/site/Dockerfile
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - frontend

  frontend:
    depends_on:
      site:
        condition: service_healthy
    # NOTE: do NOT bind-mount nginx-with-site.conf directly over
    # /etc/nginx/conf.d/default.conf here. The base compose mounts the same
    # source file at /etc/nginx/bbb-templates/site.conf.template so the
    # entrypoint can `cp` + sed-edit it for TLS placeholder substitution.
    # An additional bind-mount over default.conf makes both paths resolve to
    # the same host file and the entrypoint's cp errors with "are the same
    # file", crash-looping the container. The base compose mount is enough.
